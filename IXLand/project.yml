name: IXLand
targets:
  IXLandSystem:
    type: library.static
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../IXLandSystem/fs
      - path: ../IXLandSystem/kernel
      - path: ../IXLandSystem/internal
    settings:
      PRODUCT_NAME: IXLandSystem
      HEADER_SEARCH_PATHS:
        - "$(SRCROOT)/../IXLandSystem/include"
        - "$(SRCROOT)/../IXLandSystem"
      OTHER_CFLAGS: "-std=gnu11"
  IXLandSystemTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - IXLandSystemTests
    dependencies:
      - target: IXLandSystem
    settings:
      PRODUCT_NAME: IXLandSystemTests
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.ixland.systemtests
      HEADER_SEARCH_PATHS:
        - "$(SRCROOT)/../IXLandSystem/include"
        - "$(SRCROOT)/../IXLandSystem"
  IXLand:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App
      - Workspace
      - SessionUI
      - Terminal
      - FileAccess
      - Credentials
      - Remote
    dependencies:
      - target: IXLandSystem
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ixland.app
      INFOPLIST_FILE: App/Info.plist
      HEADER_SEARCH_PATHS:
        - "$(SRCROOT)/../IXLandSystem/include"
  IXLandTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - IXLandTests
    dependencies:
      - target: IXLand
      - target: IXLandSystem
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.ixland.tests
  IXLandUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - IXLandUITests
    dependencies:
      - target: IXLand
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.ixland.uitests
schemes:
  IXLandSystem:
    build:
      targets:
        IXLandSystem: all
  IXLandSystemTests:
    build:
      targets:
        IXLandSystemTests: all
    test:
      targets:
        - IXLandSystemTests
