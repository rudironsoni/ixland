# Docker Compose for iOS Build Orchestration
# This uses Docker to coordinate builds on a remote Mac
#
# Usage:
#   export MAC_HOST=your-mac.local
#   export MAC_USER=your-username
#   docker-compose -f docker-compose.build.yml run builder hello

version: '3.8'

services:
  # Build orchestrator - syncs to Mac and builds
  builder:
    image: alpine:latest
    environment:
      - MAC_HOST=${MAC_HOST:-mac-builder.local}
      - MAC_USER=${MAC_USER:-}
    volumes:
      - .:/workspace
      - ~/.ssh:/root/.ssh:ro
      - /etc/ssh:/etc/ssh:ro
    working_dir: /workspace
    command: >
      sh -c "
        apk add --no-cache openssh-client rsync bash &&
        ./scripts/build-on-mac.sh \${PACKAGE:-hello}
      "

  # Test the build system (no Mac required)
  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    command: ./scripts/test-build-system.sh

  # Validate package metadata (no Mac required)
  validate:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    command: >
      bash -c "
        cd /workspace/ashell-packages &&
        echo '=== Package Validation ===' &&
        for pkg in */build.sh; do
          pkg_name=\$$(dirname \$$pkg)
          echo -n \"Validating \$$pkg_name: \" &&
          bash -n \$$pkg && echo 'OK' || echo 'SYNTAX ERROR'
        done
      "

  # SSH into the Mac for debugging
  debug-mac:
    image: alpine:latest
    environment:
      - MAC_HOST=${MAC_HOST:-mac-builder.local}
      - MAC_USER=${MAC_USER:-}
    volumes:
      - ~/.ssh:/root/.ssh:ro
    command: >
      sh -c "
        apk add --no-cache openssh-client &&
        echo 'Connecting to \$MAC_HOST...' &&
        ssh -o ConnectTimeout=10 \${MAC_USER}@\${MAC_HOST}
      "
    stdin_open: true
    tty: true
