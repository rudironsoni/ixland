name: Xcode Coherence

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  xcode-build:
    name: Build IXLand
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show project targets
        run: xcodebuild -project IXLand/IXLand.xcodeproj -list

      - name: Build app
        run: xcodebuild -project IXLand/IXLand.xcodeproj -scheme IXLand -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' build

      - name: Run unit tests
        run: xcodebuild -project IXLand/IXLand.xcodeproj -scheme IXLandTests -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' test

      - name: Run UI tests
        run: xcodebuild -project IXLand/IXLand.xcodeproj -scheme IXLandUITests -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' test
