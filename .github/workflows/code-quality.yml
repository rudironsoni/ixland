name: Lint & Format

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  type-check-c:
    name: Type Check C Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Type Check C Components
      run: |
        echo "Running type analysis on all C components..."

        # Type check all C source files across all components
        find ixland-libc ixland-system ixland-wasm ixland-packages ixland-toolchain \
          -type f \( -name "*.c" -o -name "*.h" \) \
          -not -path "*/wamr/*" \
          -not -path "*/node_modules/*" \
          -not -path "*/Resources/*" \
          -not -path "*/.build/*" \
          -not -path "*/build/*" \
          > c_source_files.txt

        EXIT_CODE=0
        TOTAL=0
        ISSUES=0

        while IFS= read -r file; do
          if [ -f "$file" ]; then
            TOTAL=$((TOTAL + 1))
            echo "Type checking: $file"

            # Determine include paths based on file location
            INCLUDES=""
            if [[ "$file" == *"ixland-libc"* ]]; then
              INCLUDES="-I./ixland-libc/include"
            elif [[ "$file" == *"ixland-system"* ]]; then
              INCLUDES="-I./ixland-system/include -I./ixland-system/src/ixland/internal"
            elif [[ "$file" == *"ixland-wasm"* ]]; then
              INCLUDES="-I./ixland-wasm/include"
            fi

            # Run clang-tidy with type-related checks only
            if ! clang-tidy "$file" \
              --checks='clang-analyzer-*,bugprone-*,-bugprone-easily-swappable-parameters' \
              -- $INCLUDES 2>/dev/null; then
              ISSUES=$((ISSUES + 1))
            fi
          fi
        done < c_source_files.txt

        echo ""
        echo "Type check complete: $TOTAL files checked, $ISSUES files with issues"
        exit $EXIT_CODE
      continue-on-error: true

  strict-typing-c:
    name: Strict Type Checking C Code
    runs-on: ubuntu-latest
    needs: type-check-c

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Strict Type Check ixland-libc
      run: |
        echo "Building ixland-libc with strict type checking..."
        cmake -B build-libc -S ixland-libc \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_C_FLAGS="-Wall -Wextra -Werror -Werror=implicit-function-declaration -Werror=incompatible-pointer-types -Werror=int-conversion -Werror=return-type -Werror=uninitialized -Werror=strict-prototypes -Werror=old-style-definition -Werror=missing-prototypes -Werror=implicit-int -Werror=pointer-sign -Werror=discarded-qualifiers" \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_SYSROOT="" \
          -DCMAKE_C_STANDARD=11 \
          -DIXLAND_LIBC_BUILD_TESTS=OFF
        cmake --build build-libc 2>&1 || echo "Strict type check found issues in ixland-libc"
      continue-on-error: true

    - name: Run clang-tidy with Strict Mode
      run: |
        echo "Running clang-tidy with strict type checking..."
        if command -v clang-tidy &> /dev/null; then
          # Check that WarningsAsErrors is set
          grep -q "WarningsAsErrors: '\*'" .clang-tidy && echo "clang-tidy strict mode: ENABLED"

          # Sample strict check on key files
          for file in ixland-libc/src/ixland_version.c ixland-libc/src/usersdb/pwd.c; do
            if [ -f "$file" ]; then
              echo "Strict check: $file"
              clang-tidy "$file" -- -I./ixland-libc/include 2>/dev/null || true
            fi
          done
        fi
      continue-on-error: true

  dead-code-check:
    name: Dead Code Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy shellcheck

    - name: Check C Dead Code
      run: |
        echo "Running dead code detection on C components..."

        # Find all C source files
        find ixland-libc ixland-system ixland-wasm ixland-packages ixland-toolchain \
          -type f \( -name "*.c" -o -name "*.h" \) \
          -not -path "*/wamr/*" \
          -not -path "*/node_modules/*" \
          -not -path "*/Resources/*" \
          -not -path "*/.build/*" \
          -not -path "*/build/*" \
          > c_dead_code_files.txt

        ISSUES=0
        while IFS= read -r file; do
          if [ -f "$file" ]; then
            # Determine include paths based on file location
            INCLUDES=""
            if [[ "$file" == *"ixland-libc"* ]]; then
              INCLUDES="-I./ixland-libc/include"
            elif [[ "$file" == *"ixland-system"* ]]; then
              INCLUDES="-I./ixland-system/include -I./ixland-system/src/ixland/internal"
            elif [[ "$file" == *"ixland-wasm"* ]]; then
              INCLUDES="-I./ixland-wasm/include"
            fi

            # Run clang-tidy with dead code checks
            OUTPUT=$(clang-tidy "$file" \
              --checks='misc-unused-parameters,misc-unused-alias-decls,misc-unused-using-decls,readability-delete-null-pointer,readability-redundant-*,cppcoreguidelines-*-unused-parameters' \
              -- $INCLUDES 2>/dev/null) || true

            if echo "$OUTPUT" | grep -q "warning:"; then
              echo "  ⚠ Dead code in: $file"
              echo "$OUTPUT" | grep "warning:" | head -2
              ISSUES=$((ISSUES + 1))
            fi
          fi
        done < c_dead_code_files.txt

        echo ""
        echo "Dead code check complete: $(wc -l < c_dead_code_files.txt) files checked, $ISSUES files with potential dead code"
        rm -f c_dead_code_files.txt
      continue-on-error: true

    - name: Check Shell Script Dead Code
      run: |
        echo "Checking shell scripts for unused variables..."
        find . -name "*.sh" -not -path "./ixland-app/Resources/*" -not -path "./.git/*" | while read -r file; do
          if [ -f "$file" ]; then
            OUTPUT=$(shellcheck -S warning "$file" 2>/dev/null) || true
            if echo "$OUTPUT" | grep -q "SC2034"; then
              echo "  ⚠ Unused variables in: $file"
            fi
          fi
        done
      continue-on-error: true

  format-c:
    name: Format C Code
    runs-on: ubuntu-latest
    needs: type-check-c

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check C Code Formatting
      run: |
        # Check all C code directories
        find ixland-system ixland-libc ixland-wasm ixland-packages ixland-toolchain \
          -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" \) \
          -not -path "*/wamr/*" \
          -not -path "*/node_modules/*" \
          -not -path "*/Resources/*" \
          -not -path "*/.build/*" \
          > c_files.txt

        echo "Checking formatting for C files..."
        TOTAL=0
        UNFORMATTED=0
        while IFS= read -r file; do
          if [ -f "$file" ]; then
            TOTAL=$((TOTAL + 1))
            if ! clang-format --dry-run --Werror "$file" > /dev/null 2>&1; then
              echo "  ❌ $file"
              UNFORMATTED=$((UNFORMATTED + 1))
            fi
          fi
        done < c_files.txt

        echo ""
        echo "Format check complete: $TOTAL files checked, $UNFORMATTED unformatted"

        if [ $UNFORMATTED -gt 0 ]; then
          echo "Run './scripts/format.sh --fix' to auto-fix formatting issues"
          exit 1
        fi

  naming-c:
    name: Check C Naming Conventions
    runs-on: ubuntu-latest
    needs: format-c

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Verify Naming Conventions
      run: |
        echo "Checking C naming conventions..."

        # Check for naming convention violations
        find ixland-libc/src -name "*.c" | while read -r file; do
          echo "Checking: $file"
          clang-tidy "$file" --checks='readability-identifier-naming' -- -I./ixland-libc/include 2>/dev/null || true
        done

        echo "Naming convention check complete"

  lint-c:
    name: Lint C Code
    runs-on: ubuntu-latest
    needs: naming-c
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Run clang-tidy on Core Files
      run: |
        # Run clang-tidy on key source files
        if command -v clang-tidy &> /dev/null; then
          for file in ixland-libc/src/*.c; do
            if [ -f "$file" ]; then
              echo "Linting: $file"
              clang-tidy "$file" -- -I./ixland-libc/include || true
            fi
          done
        fi

  naming-swift:
    name: Check Swift Naming Conventions
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: |
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi
        swiftlint version

    - name: Verify Swift Naming Conventions
      run: |
        cd ixland-app
        echo "Checking Swift naming conventions..."
        swiftlint lint --only-rule identifier_name --reporter github-actions-logging || true
        echo "Naming convention check complete"

  format-swift:
    name: Format Swift Code
    runs-on: macos-latest
    needs: naming-swift

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: |
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi
        swiftlint version

    - name: Check Swift Formatting
      run: |
        cd ixland-app
        # SwiftLint can fix some issues automatically, but we check first
        swiftlint lint --reporter github-actions-logging --strict

  lint-swift:
    name: Lint Swift Code
    runs-on: macos-latest
    needs: format-swift
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: |
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi

    - name: Run SwiftLint Analysis
      run: |
        cd ixland-app
        swiftlint analyze --reporter github-actions-logging || true

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Run ShellCheck
      run: |
        find . -name "*.sh" -not -path "./ixland-app/Resources/*" -not -path "./.git/*" | while read -r file; do
          echo "Checking: $file"
          shellcheck -S warning "$file" || true
        done
      continue-on-error: true

  tech-debt-check:
    name: Technical Debt Scanner
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Technical Debt Scanner
      run: |
        echo "Running technical debt scanner..."
        ./scripts/check-tech-debt.sh --ci
