name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-c:
    name: Lint C Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-tidy and clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy clang-format

    - name: Check C Code Formatting
      run: |
        find ixland-system ixland-libc -name "*.c" -o -name "*.h" | grep -v "/wamr/" | grep -v "/node_modules/" > c_files.txt
        echo "Checking formatting for C files..."
        while IFS= read -r file; do
          if [ -f "$file" ]; then
            clang-format --dry-run --Werror "$file" || true
          fi
        done < c_files.txt
      continue-on-error: true

    - name: Run clang-tidy on Core Files
      run: |
        # Run clang-tidy on key source files
        if command -v clang-tidy &> /dev/null; then
          for file in ixland-libc/src/*.c; do
            if [ -f "$file" ]; then
              echo "Linting: $file"
              clang-tidy "$file" -- -I./ixland-libc/include 2>/dev/null || true
            fi
          done
        fi
      continue-on-error: true

  lint-swift:
    name: Lint Swift Code
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: |
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi
        swiftlint version

    - name: Run SwiftLint
      run: |
        cd ixland-app
        swiftlint lint --reporter github-actions-logging
      continue-on-error: true

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Run ShellCheck
      run: |
        find . -name "*.sh" -not -path "./ixland-app/Resources/*" -not -path "./.git/*" | while read -r file; do
          echo "Checking: $file"
          shellcheck -S warning "$file" || true
        done
      continue-on-error: true
