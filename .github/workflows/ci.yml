# iXland Monorepo CI
#
# Minimal baseline workflow for building and testing iXland components.
# This is intentionally simple and will be expanded as the project grows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Documentation check - validates docs are not broken
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation files exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f docs/ARCHITECTURE.md || (echo "ARCHITECTURE.md missing" && exit 1)
          test -f docs/BOUNDARIES.md || (echo "BOUNDARIES.md missing" && exit 1)
          test -f docs/WASM_BOUNDARY_SPEC.md || (echo "WASM_BOUNDARY_SPEC.md missing" && exit 1)
          echo "All required documentation files present"

      - name: Check component READMEs exist
        run: |
          for dir in ixland-system ixland-packages ixland-libc ixland-wasm ixland-toolchain; do
            test -f "$dir/README.md" || (echo "$dir/README.md missing" && exit 1)
          done
          echo "All component READMEs present"

      - name: Check libc public headers exist
        run: |
          test -f ixland-libc/include/iox/iox.h || (echo "iox.h missing" && exit 1)
          test -f ixland-libc/include/iox/iox_types.h || (echo "iox_types.h missing" && exit 1)
          test -f ixland-libc/include/iox/iox_syscalls.h || (echo "iox_syscalls.h missing" && exit 1)
          test -f ixland-libc/include/iox/sys/types.h || (echo "sys/types.h missing" && exit 1)
          echo "All libc public headers present"

      - name: Check Wasm contract headers exist
        run: |
          test -f ixland-wasm/include/ixland/wasm/types.h || (echo "wasm/types.h missing" && exit 1)
          test -f ixland-wasm/include/ixland/wasm/engine.h || (echo "wasm/engine.h missing" && exit 1)
          test -f ixland-wasm/include/ixland/wasm/host.h || (echo "wasm/host.h missing" && exit 1)
          test -f ixland-wasm/include/ixland/wasm/wasi.h || (echo "wasm/wasi.h missing" && exit 1)
          echo "All Wasm contract headers present"

      - name: Check old headers do NOT exist in ixland-system
        run: |
          if test -f ixland-system/include/iox/iox.h; then echo "OLD iox.h should not exist" && exit 1; fi
          if test -f ixland-system/include/iox/iox_types.h; then echo "OLD iox_types.h should not exist" && exit 1; fi
          if test -f ixland-system/include/iox/iox_syscalls.h; then echo "OLD iox_syscalls.h should not exist" && exit 1; fi
          if test -d ixland-system/include/iox/sys; then echo "OLD sys/ should not exist" && exit 1; fi
          echo "Old headers correctly removed from ixland-system"

  # Structure validation - ensures monorepo layout is correct
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate top-level structure
        run: |
          for dir in ixland-app ixland-system ixland-packages ixland-libc ixland-wasm ixland-toolchain docs; do
            test -d "$dir" || (echo "Required directory $dir missing" && exit 1)
          done
          echo "All required top-level directories present"

      - name: Validate CMakeLists.txt exists
        run: |
          test -f CMakeLists.txt || (echo "Root CMakeLists.txt missing" && exit 1)
          echo "Root CMakeLists.txt present"

  # Placeholder for future iOS build
  # Currently just validates CMake configuration parses
  cmake-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CMake is available
        run: cmake --version

      - name: Validate CMakeLists.txt syntax (dry run)
        run: |
          # This validates the CMakeLists.txt is syntactically correct
          # but skips actual iOS build (requires Xcode setup)
          cmake -P - <<'EOF'
            file(READ "${CMAKE_CURRENT_LIST_DIR}/CMakeLists.txt" content)
            message(STATUS "CMakeLists.txt is readable and valid")
          EOF
