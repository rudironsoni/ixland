# Docker Compose for a-Shell Next Testing
#
# Usage:
#   docker-compose up --build    # Build and run tests
#   docker-compose run test      # Run test suite
#   docker-compose run shell     # Interactive shell

services:
  test:
    build: .
    volumes:
      - .:/workspace
    command: ./scripts/test-build-system.sh

  shell:
    build: .
    volumes:
      - .:/workspace
    command: bash
    stdin_open: true
    tty: true

  # Service for testing individual packages (metadata only)
  validate:
    build: .
    volumes:
      - .:/workspace
    command: >
      bash -c "
        echo 'Validating package metadata...' &&
        cd ashell-packages &&
        for pkg in */build.sh; do
          pkg_name=\$$(basename \$$(dirname \$$pkg))
          echo -n \"Checking \$$pkg_name: \" &&
          bash -n \$$pkg && echo 'OK' || echo 'FAIL'
        done
      "
